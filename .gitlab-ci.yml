# GitLab CI/CD - my-boilerplates
#
# 1) Validation Pipeline (main push, MR)
#    각 boilerplate를 degit 시뮬레이션으로 검증
#
# 2) Deploy Pipeline (tag push: {name}/v{YYYY}.{M}.{patch})
#    해당 boilerplate만 Docker 빌드 → Registry push → Portainer 배포
#
# 파일 구조:
#   .gitlab/ci/
#     _templates.yml          — 공통 rules, degit-node 템플릿
#     validate-web.yml        — web boilerplate 검증
#     validate-bot.yml        — bot (TS + Python) 검증
#     validate-cli.yml        — cli (TS + Rust + Go) 검증
#     validate-native-app.yml — native-app 검증
#     validate-ai-context.yml — ai-context 검증
#     docker-build.yml        — Dockerfile 빌드 검증
#     deploy.yml              — tag push → 멀티플랫폼 빌드 + Portainer 배포
#
# Runners:
#   - gitlab-runner-linux (amd64, docker/dind) : tags [docker, linux, amd64]
#   - mac-mini-2 (arm64, shell executor)       : tags [shell, mac-mini-2]

stages:
  - validate
  - docker
  - build-image
  - deploy

include:
  - local: .gitlab/ci/_templates.yml
  - local: .gitlab/ci/validate-web.yml
  - local: .gitlab/ci/validate-bot.yml
  - local: .gitlab/ci/validate-cli.yml
  - local: .gitlab/ci/validate-native-app.yml
  - local: .gitlab/ci/validate-ai-context.yml
  - local: .gitlab/ci/docker-build.yml
  - local: .gitlab/ci/deploy.yml

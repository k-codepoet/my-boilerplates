# GitLab CI/CD - my-boilerplates
#
# 1) Validation Pipeline (main push, MR)
#    각 boilerplate를 degit 시뮬레이션으로 검증:
#    copy → install → build → typecheck
#
# 2) Deploy Pipeline (tag push)
#    태그 형식: {이름}/v{연}.{월}.{패치}  예) sample-ssr/v2026.3.1
#    → 해당 boilerplate만 Docker 빌드 → Registry push → my-devops 태그 업데이트 → Portainer webhook
#
# Pipeline 구조:
#   validate:  (main push, MR)
#     ├─ validate:web, validate:bot-ts, validate:bot-python, ...
#     └─ docker:build  (Dockerfile 검증)
#   deploy:    (tag push: {name}/v*)
#     ├─ build-image   (멀티플랫폼 Docker 빌드 → Registry push)
#     └─ deploy        (my-devops compose 태그 업데이트 → Portainer webhook)
#
# Runners:
#   - gitlab-runner-linux (amd64, docker/dind) : tags [docker, linux, amd64]
#   - mac-mini-2 (arm64, shell executor)       : tags [shell, mac-mini-2]
#
# 트리거: main push, MR (validate) / tag push (deploy)
#
# CI Variables (GitLab Settings > CI/CD > Variables):
#   DEVOPS_DEPLOY_TOKEN   — my-devops repo push용 GitLab Deploy Token [Protected, Masked]
#
# Deploy Registry (배포 대상 매핑):
#   deploy-registry.yml 참조 — 태그 이름 → boilerplate 경로, 이미지, compose, webhook 매핑

stages:
  - validate
  - docker
  - build-image
  - deploy

# ============================================================
#  Rules & Templates
# ============================================================

.rules:main:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# Node.js boilerplate degit 시뮬레이션 템플릿
# 독립 디렉토리에 복사 → pnpm install → build → typecheck
.degit-node:
  stage: validate
  image: node:22
  tags:
    - docker
    - linux
    - amd64
  extends: .rules:main
  timeout: 15m
  before_script:
    - corepack enable
    - corepack prepare pnpm@latest --activate
  script:
    - echo "=== Validating ${APP_PATH} (degit simulation) ==="
    - mkdir -p /tmp/test-app
    - cp -r ${APP_PATH}/. /tmp/test-app/
    - cd /tmp/test-app
    - pnpm install --no-frozen-lockfile
    - |
      if node -e "process.exit(require('./package.json').scripts?.build ? 0 : 1)" 2>/dev/null; then
        echo ">>> pnpm build"
        pnpm build
      else
        echo ">>> No build script, skipping"
      fi
    - |
      if node -e "process.exit(require('./package.json').scripts?.typecheck ? 0 : 1)" 2>/dev/null; then
        echo ">>> pnpm typecheck"
        pnpm typecheck
      else
        echo ">>> No typecheck script, skipping"
      fi
    - echo "=== ${APP_PATH} OK ==="

# ============================================================
#  Stage 1: Validate (degit simulation)
# ============================================================

# --- Web boilerplates (Node.js) ---
validate:web:
  extends: .degit-node
  parallel:
    matrix:
      - APP_PATH:
          - web/react-router-spa
          - web/react-router-ssr
          - web/react-router-ssr-authentik
          - web/react-router-spa-cloudflare
          - web/react-router-ssr-cloudflare
          - web/tanstack-router-spa
          - web/tanstack-start-ssr

# --- Bot TypeScript boilerplates (Node.js) ---
validate:bot-ts:
  extends: .degit-node
  parallel:
    matrix:
      - APP_PATH:
          - bot/slack-processor-ts
          - bot/slack-processor-ts-cloudflare

# --- CLI TypeScript (Node.js) ---
validate:cli-ts:
  extends: .degit-node
  variables:
    APP_PATH: cli/ink-ts

# --- AI Context boilerplates (Node.js) ---
validate:ai-context:
  extends: .degit-node
  parallel:
    matrix:
      - APP_PATH:
          - ai-context/react-router-ssr-mcp

# --- Native App boilerplates (frontend only, Tauri build는 Rust 필요) ---
validate:native-app:
  extends: .degit-node
  parallel:
    matrix:
      - APP_PATH:
          - native-app/tauri-react
          - native-app/tauri-react-router

# --- CLI Rust (ratatui-rs) ---
validate:cli-rust:
  stage: validate
  image: rust:1.83-bookworm
  tags:
    - docker
    - linux
    - amd64
  extends: .rules:main
  timeout: 30m
  cache:
    key: cargo-ratatui
    paths:
      - .cargo-cache/registry/cache/
      - .cargo-cache/registry/index/
      - .cargo-cache/git/db/
    policy: pull-push
  variables:
    CARGO_HOME: ${CI_PROJECT_DIR}/.cargo-cache
  script:
    - echo "=== Validating cli/ratatui-rs (degit simulation) ==="
    - mkdir -p /tmp/test-app
    - cp -r cli/ratatui-rs/. /tmp/test-app/
    - cd /tmp/test-app
    - cargo check
    - echo "=== cli/ratatui-rs OK ==="

# --- CLI Go (bubbletea-go) ---
validate:cli-go:
  stage: validate
  image: golang:1.23-bookworm
  tags:
    - docker
    - linux
    - amd64
  extends: .rules:main
  timeout: 10m
  variables:
    GOPATH: ${CI_PROJECT_DIR}/.go-cache
  cache:
    key: go-bubbletea
    paths:
      - .go-cache/pkg/mod/
    policy: pull-push
  script:
    - echo "=== Validating cli/bubbletea-go (degit simulation) ==="
    - mkdir -p /tmp/test-app
    - cp -r cli/bubbletea-go/. /tmp/test-app/
    - cd /tmp/test-app
    - go mod tidy
    - go build ./cmd
    - echo "=== cli/bubbletea-go OK ==="

# --- Bot Python (slack-processor-python) ---
validate:bot-python:
  stage: validate
  image: python:3.12-bookworm
  tags:
    - docker
    - linux
    - amd64
  extends: .rules:main
  timeout: 10m
  script:
    - echo "=== Validating bot/slack-processor-python (degit simulation) ==="
    - pip install uv
    - mkdir -p /tmp/test-app
    - cp -r bot/slack-processor-python/. /tmp/test-app/
    - cd /tmp/test-app
    - uv venv
    - . .venv/bin/activate
    - uv pip install -e ".[dev]" 2>/dev/null || uv pip install -e .
    - |
      if [ -f "pyproject.toml" ] && grep -q "ruff" pyproject.toml; then
        uv pip install ruff
        echo ">>> ruff check"
        ruff check src/ || true
      fi
    - |
      if [ -f "pyproject.toml" ] && grep -q "mypy" pyproject.toml; then
        uv pip install mypy
        echo ">>> mypy (non-blocking)"
        mypy src/ || true
      fi
    - echo "=== bot/slack-processor-python OK ==="

# ============================================================
#  Stage 2: Docker Build Verification
# ============================================================

docker:build:
  stage: docker
  image: docker:27
  services:
    - docker:27-dind
  tags:
    - docker
    - linux
    - amd64
  extends: .rules:main
  timeout: 20m
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  parallel:
    matrix:
      - APP_PATH:
          - web/react-router-spa
          - web/react-router-ssr
          - web/react-router-ssr-authentik
          - web/tanstack-start-ssr
          - bot/slack-processor-python
          - ai-context/react-router-ssr-mcp
  script:
    - echo "=== Docker build ${APP_PATH} ==="
    - cd ${APP_PATH}
    - docker build -t test-boilerplate:ci .
    - echo "=== Docker build ${APP_PATH} OK ==="

# ============================================================
#  Stage 3: Build Image (tag push → 멀티플랫폼 Docker 빌드)
# ============================================================
#
# 태그 형식: {이름}/v{연}.{월}.{패치}
#   예) sample-ssr/v2026.3.1 → web/react-router-ssr-authentik 빌드
#
# deploy-registry.yml에서 태그 이름 → boilerplate 경로, 이미지, compose 매핑
# 새 boilerplate 배포 추가 시 deploy-registry.yml만 수정하면 됨
#
# Runner: mac-mini-2 (shell executor, arm64 + QEMU amd64)

build-image:
  stage: build-image
  tags:
    - shell
    - mac-mini-2
  timeout: 20m
  rules:
    - if: '$CI_COMMIT_TAG =~ /^[a-z0-9-]+\/v\d{4}\.\d+\.\d+$/'
  before_script:
    - export PATH="/opt/homebrew/bin:$PATH"
    # 태그에서 이름과 버전 추출
    - export DEPLOY_NAME="${CI_COMMIT_TAG%%/*}"
    - export DEPLOY_VERSION="${CI_COMMIT_TAG#*/}"
    - echo "Deploy name=${DEPLOY_NAME} version=${DEPLOY_VERSION}"
    # deploy-registry.yml에서 설정 로드
    - |
      if ! grep -q "^${DEPLOY_NAME}:" deploy-registry.yml; then
        echo "ERROR: '${DEPLOY_NAME}' not found in deploy-registry.yml"
        echo "Available targets:"
        grep '^[a-z]' deploy-registry.yml | cut -d: -f1
        exit 1
      fi
    - export APP_PATH=$(grep "^${DEPLOY_NAME}:" deploy-registry.yml | awk '{print $2}')
    - export IMAGE_NAME=$(grep "^${DEPLOY_NAME}:" deploy-registry.yml | awk '{print $3}')
    - export COMPOSE_PATH=$(grep "^${DEPLOY_NAME}:" deploy-registry.yml | awk '{print $4}')
    - export WEBHOOK_VAR=$(grep "^${DEPLOY_NAME}:" deploy-registry.yml | awk '{print $5}')
    - echo "APP_PATH=${APP_PATH} IMAGE_NAME=${IMAGE_NAME}"
    - echo "COMPOSE_PATH=${COMPOSE_PATH} WEBHOOK_VAR=${WEBHOOK_VAR}"
    # QEMU + buildx
    - docker run --privileged --rm tonistiigi/binfmt --install all
    - docker buildx use multiarch || docker buildx create --name multiarch --use --driver docker-container
    - docker buildx inspect --bootstrap
    # GitLab Registry login
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}
  script:
    - export PATH="/opt/homebrew/bin:$PATH"
    - export DEPLOY_NAME="${CI_COMMIT_TAG%%/*}"
    - export DEPLOY_VERSION="${CI_COMMIT_TAG#*/}"
    - export APP_PATH=$(grep "^${DEPLOY_NAME}:" deploy-registry.yml | awk '{print $2}')
    - export IMAGE_NAME=$(grep "^${DEPLOY_NAME}:" deploy-registry.yml | awk '{print $3}')
    - |
      FULL_IMAGE="${CI_REGISTRY_IMAGE}/${IMAGE_NAME}"
      echo "Building ${FULL_IMAGE}:${DEPLOY_VERSION}"

      # degit 시뮬레이션: 독립 디렉토리에 복사 → standalone lockfile 생성
      mkdir -p /tmp/build-app
      cp -r ${APP_PATH}/. /tmp/build-app/
      cd /tmp/build-app

      # pnpm lockfile 생성 (monorepo lockfile은 사용 불가)
      corepack enable
      corepack prepare pnpm@latest --activate
      pnpm install --no-frozen-lockfile

      # 멀티플랫폼 빌드 + push
      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        -t ${FULL_IMAGE}:${DEPLOY_VERSION} \
        -t ${FULL_IMAGE}:latest \
        --push \
        .

      echo ""
      echo "=== Images pushed ==="
      echo "  ${FULL_IMAGE}:${DEPLOY_VERSION}"
      echo "  ${FULL_IMAGE}:latest"

# ============================================================
#  Stage 4: Deploy (my-devops compose 업데이트 + Portainer webhook)
# ============================================================

deploy:
  stage: deploy
  tags:
    - shell
    - mac-mini-2
  timeout: 5m
  needs:
    - job: build-image
  rules:
    - if: '$CI_COMMIT_TAG =~ /^[a-z0-9-]+\/v\d{4}\.\d+\.\d+$/'
  variables:
    DEVOPS_REPO: https://gitlab.home.codepoet.site/k-codepoet/my-devops.git
  script:
    - export PATH="/opt/homebrew/bin:$PATH"
    - export DEPLOY_NAME="${CI_COMMIT_TAG%%/*}"
    - export DEPLOY_VERSION="${CI_COMMIT_TAG#*/}"
    - export IMAGE_NAME=$(grep "^${DEPLOY_NAME}:" deploy-registry.yml | awk '{print $3}')
    - export COMPOSE_PATH=$(grep "^${DEPLOY_NAME}:" deploy-registry.yml | awk '{print $4}')
    - export WEBHOOK_VAR=$(grep "^${DEPLOY_NAME}:" deploy-registry.yml | awk '{print $5}')
    - |
      echo "Deploying ${DEPLOY_NAME} ${DEPLOY_VERSION}"

      # Clone my-devops repo
      git clone --depth 1 https://oauth2:${DEVOPS_DEPLOY_TOKEN}@gitlab.home.codepoet.site/k-codepoet/my-devops.git
      cd my-devops

      # Update image tag in compose
      FULL_IMAGE="${CI_REGISTRY_IMAGE}/${IMAGE_NAME}"
      # 이미지 라인에서 태그만 교체 (이미지 경로는 유지)
      sed -i "s|${IMAGE_NAME}:.*|${IMAGE_NAME}:${DEPLOY_VERSION}|" ${COMPOSE_PATH}

      echo "Updated compose:"
      grep "image:" ${COMPOSE_PATH}

      # Commit and push
      git config user.name "GitLab CI"
      git config user.email "ci@gitlab.home.codepoet.site"
      git add ${COMPOSE_PATH}
      git commit -m "deploy: ${DEPLOY_NAME} ${DEPLOY_VERSION}"
      git push

      # Portainer webhook
      # WEBHOOK_VAR은 CI Variable 이름 (간접 참조)
      WEBHOOK_URL=$(eval echo "\${${WEBHOOK_VAR}:-}")
      if [ -n "${WEBHOOK_URL}" ]; then
        echo "Triggering Portainer webhook..."
        curl -sfk -X POST "${WEBHOOK_URL}" && echo "Webhook OK" || echo "Webhook failed (will update via polling)"
      else
        echo "${WEBHOOK_VAR} not set — stack will update via 5min polling"
      fi

      echo ""
      echo "=== Deploy complete ==="
      echo "  Image: ${IMAGE_NAME}:${DEPLOY_VERSION}"
      echo "  Compose: ${COMPOSE_PATH}"
